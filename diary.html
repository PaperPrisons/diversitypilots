<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <title>Diary - Diversity Pilots Initiative</title>
  <link rel="stylesheet" href="./dist/output.css" />
  <style>
    body { min-height: 700px; }
    #quoteDiv {
      position: relative; width: 90%; min-height: 550px; text-align: center;
      vertical-align: middle; display: flex; border-top: 2.25px solid rgb(0 0 0 / 3%);
      box-shadow: 0 2.8px 2.2px rgb(0 0 0 / 3%), 0 6.7px 5.3px rgb(0 0 0 / 5%),
        0 12.5px 10px rgb(0 0 0 / 6%), 0 22.3px 17.9px rgb(0 0 0 / 7%),
        0 41.8px 33.4px rgb(0 0 0 / 9%), 0 10px 10px rgb(0 0 0 / 12%);
    }
    #whiteDiv { background-color: #fff; width: 100%; min-height: 600px; text-align: center; display: flex; }
    .bQuote { opacity: 0; display: none; margin: auto; width: 80%; font-size: 24px; color: #2e2e2e; }
    .userinfo { font-size: 24px; }
    .visible { display: inline-block; animation: fadein ease-in 10s normal forwards; }
    @keyframes fadein { 0% { opacity: 0; } 50%, 100% { opacity: 1; } }
    #bottom { position: absolute; bottom: 10%; right: 10%; width: 20%; opacity: 50%; }
    #bottom2 { position: absolute; bottom: 5%; right: 10%; font-size: 12px; }
    div#pause { position: absolute; bottom: 10%; left: 10%; background-color: grey; border-radius: 25%; width: 4rem; height: 2rem; }
    div#pause p:hover { cursor: pointer; }
    @media screen and (max-width: 845px) {
      .bQuote { font-size: 14px; }
      .userinfo { font-size: 14px; }
      #bottom2 { font-size: 8px; }
    }
  </style>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"
    integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo=" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.1.0/papaparse.min.js"></script>
  <script>
    let paused = false;
    Papa.parse(
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vSEP1wuLboZgvqTchbpjlEB4OVM3NPslMiRLvXCaUuz-Ic94EQJda5GUeFOps-jlU4Auj_sYgtYsp-N/pub?output=csv",
      {
        download: true, header: true,
        complete: function(results) {
          var quotesData = results.data;
          var container = document.getElementById("whiteDiv");
          for (var i = 0; i < quotesData.length; i++) {
            var p = document.createElement("p");
            p.classList.add("bQuote");
            p.innerHTML = "<strong>" + quotesData[i].question + "</strong><br/>" +
              quotesData[i].quote + "<br><br>- <span class='userinfo'>" + quotesData[i].name.trim();
            if (quotesData[i].info.trim()) p.innerHTML += ", " + quotesData[i].info.trim();
            p.innerHTML += "</span>";
            container.appendChild(p);
          }
          showNext(0, document.querySelectorAll(".bQuote"));
        }
      }
    );
    function showNext(index, pList) {
      pList[index].classList.add("visible");
      setTimeout(function() {
        pList[index].classList.remove("visible");
        if (!paused) index++;
        showNext(index % pList.length, pList);
      }, 10000);
    }
  </script>
</head>
<body class="bg-white text-gray-900">

  <div id="header"></div>

  <article class="container mx-auto py-12 px-4">
    <div id="quoteDiv" class="mx-auto">
      <div id="whiteDiv"></div>
      <div id="pause"><p type="button" name="button" onclick="handlePause()">Pause</p></div>
      <img id="bottom" src="images/logos/DPI.png" alt="@Diversity Pilots" />
      <span id="bottom2">https://diversitypilots.org/diary.html</span>
    </div>
  </article>

  <div id="footer"></div>

  <script src="./scripts/include.js"></script>
  <script>
    htmlInclude('header', './components/header.html').then(function() { initHeader('Diary'); });
    htmlInclude('footer', './components/footer.html');
    function handlePause() {
      paused = !paused;
      document.getElementById("pause").children[0].innerText = paused ? "Play" : "Pause";
    }
  </script>

</body>
</html>
