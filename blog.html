<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DPI Blog</title>
  <link rel="stylesheet" href="./dist/output.css" />
</head>
<body class="bg-white text-gray-900">

  <div id="header"></div>

  <section id="blog" style="background-color: #f8f7f5;">
    <div class="w-full py-12 md:py-16">
      <div id="blog-page-1" class="max-w-7xl mx-auto px-6 sm:px-8 grid grid-cols-1 md:grid-cols-3 gap-8 md:gap-10 lg:gap-12 min-h-[200px]">
        <p class="col-span-full text-center text-gray-500">Loading posts…</p>
      </div>
      <nav id="blog-pagination" class="max-w-7xl mx-auto px-6 sm:px-8 mt-12 flex justify-center items-center gap-2 flex-wrap" aria-label="Blog pagination"></nav>
    </div>
  </section>

  <div id="footer"></div>

  <script src="./scripts/include.js"></script>
  <script src="./scripts/wix-blog.js"></script>
  <script>
    htmlInclude('header', './components/header.html').then(function() { initHeader('Research Blog'); });
    htmlInclude('footer', './components/footer.html');
    if (typeof window.loadWixBlog === 'function') window.loadWixBlog();
  </script>

</body>
</html>
